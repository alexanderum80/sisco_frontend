query ConciliaDWH($conciliaDWHInput: ConciliaDWHInput!) {
    conciliaDWH(conciliaDWHInput: $conciliaDWHInput) {
        Tipo
        IdCentro
        Centro
        IdUnidad
        Unidad
        IdPiso
        Almacen
        Cuenta
        Periodo
        SaldoGolden
        SaldoRestaurador
        DifGoldenRest
        SaldoDistribuidor
        DifGoldenDist
        SaldoRodas
        DifGoldenRodas
        IdDivision
        Division
        CuentaR
        Nota
    }
}